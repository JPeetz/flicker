<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>constellations</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #05051a;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: rgba(180, 180, 255, 0.6);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: crosshair;
    user-select: none;
  }
  canvas {
    position: fixed;
    top: 0; left: 0;
    z-index: 1;
  }
  #input-area {
    position: fixed;
    bottom: 60px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  #prompt {
    font-size: 13px;
    letter-spacing: 2px;
    color: rgba(160, 160, 220, 0.4);
    text-align: center;
    transition: opacity 2s;
  }
  #word-input {
    background: none;
    border: none;
    border-bottom: 1px solid rgba(160, 160, 220, 0.15);
    color: rgba(200, 200, 255, 0.7);
    font-family: 'Courier New', monospace;
    font-size: 16px;
    text-align: center;
    width: 300px;
    padding: 8px 4px;
    outline: none;
    letter-spacing: 2px;
    transition: border-color 0.8s;
  }
  #word-input:focus { border-bottom-color: rgba(180, 180, 255, 0.4); }
  #word-input::placeholder { color: rgba(140, 140, 200, 0.2); }
  .hint {
    position: fixed;
    top: 30px;
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(160, 160, 220, 0.2);
    z-index: 5;
    transition: opacity 3s;
  }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div class="hint" id="hint">type something and press enter</div>
<div id="input-area">
  <span id="prompt">say something that doesn't need to be kept</span>
  <input type="text" id="word-input" placeholder="..." autofocus maxlength="120">
</div>

<script>
const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');
const input = document.getElementById('word-input');
const prompt = document.getElementById('prompt');
const hint = document.getElementById('hint');

let W, H;
let backgroundStars = [];
let constellations = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  drawBackground();
}
window.addEventListener('resize', resize);

// Static background stars
for (let i = 0; i < 200; i++) {
  backgroundStars.push({
    x: Math.random(),
    y: Math.random(),
    r: Math.random() * 1.2,
    b: Math.random() * 0.5 + 0.3,
  });
}
function drawBackground() {
  ctx.clearRect(0, 0, W, H);
  backgroundStars.forEach(s => {
    const twinkle = s.b + Math.sin(Date.now() * 0.002 + s.x * 100) * 0.2;
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180, 180, 255, ${Math.max(0.1, twinkle)})`;
    ctx.fill();
  });
}

class Star {
  constructor(x, y, char) {
    this.x = x;
    this.y = y;
    this.char = char;
    this.r = 2 + Math.random() * 3;
    this.life = 1.0;
    this.decay = 0.0003 + Math.random() * 0.0007;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = -0.1 - Math.random() * 0.4;
    this.hue = 240 + Math.random() * 60;
  }
  update() {
    this.life -= this.decay;
    this.x += this.vx;
    this.y += this.vy;
  }
  draw(ctx) {
    const alpha = this.life * 0.8;
    // Glow
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 4);
    grad.addColorStop(0, `hsla(${this.hue}, 80%, 70%, ${alpha})`);
    grad.addColorStop(0.4, `hsla(${this.hue}, 60%, 50%, ${alpha * 0.3})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * 4, 0, Math.PI * 2);
    ctx.fill();
    // Core
    ctx.fillStyle = `rgba(220, 220, 255, ${alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
    // Character
    if (this.life > 0.3) {
      ctx.fillStyle = `rgba(200, 200, 255, ${this.life * 0.5})`;
      ctx.font = `${10 + this.r * 3}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillText(this.char, this.x, this.y - 20 - this.r * 2);
    }
  }
}

function spawnConstellation(text) {
  const chars = text.split('');
  const cx = W / 2 + (Math.random() - 0.5) * 200;
  const cy = H * 0.4 + (Math.random() - 0.5) * 100;
  const stars = [];
  
  // Spiral layout
  chars.forEach((char, i) => {
    const angle = (i / chars.length) * Math.PI * 3 + Math.random() * 0.5;
    const radius = 40 + i * 18 + Math.random() * 30;
    stars.push(new Star(
      cx + Math.cos(angle) * radius,
      cy + Math.sin(angle) * radius * 0.6,
      char
    ));
  });
  
  // Connection lines metadata
  constellations.push({ stars, lines: [], age: 0 });
  
  // Draw connecting lines between consecutive stars
  const conn = [];
  for (let i = 0; i < stars.length - 1; i++) {
    if (Math.random() > 0.3) {
      conn.push({ from: stars[i], to: stars[i + 1] });
    }
  }
  // A few random connections
  for (let i = 0; i < Math.min(3, stars.length); i++) {
    const a = Math.floor(Math.random() * stars.length);
    const b = Math.floor(Math.random() * stars.length);
    if (Math.abs(a - b) > 2) {
      conn.push({ from: stars[a], to: stars[b] });
    }
  }
  
  constellations[constellations.length - 1].lines = conn;
  constellations[constellations.length - 1].stars = stars;
  
  // Fade the prompt
  prompt.style.opacity = '0.1';
  setTimeout(() => { prompt.style.opacity = '1'; }, 4000);
  hint.style.opacity = '0';
}

function animate() {
  drawBackground();
  
  for (let c = constellations.length - 1; c >= 0; c--) {
    const con = constellations[c];
    const alive = con.stars.filter(s => s.life > 0);
    
    // Draw lines
    con.lines.forEach(line => {
      if (line.from.life > 0 && line.to.life > 0) {
        const alpha = Math.min(line.from.life, line.to.life) * 0.3;
        ctx.strokeStyle = `rgba(140, 140, 220, ${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(line.from.x, line.from.y);
        ctx.lineTo(line.to.x, line.to.y);
        ctx.stroke();
      }
    });
    
    // Draw stars
    con.stars.forEach(s => {
      if (s.life > 0) {
        s.update();
        s.draw(ctx);
      }
    });
    
    if (alive.length === 0) constellations.splice(c, 1);
  }
  
  requestAnimationFrame(animate);
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && input.value.trim()) {
    spawnConstellation(input.value.trim());
    input.value = '';
  }
});

// Click anywhere to spawn a single star
canvas.addEventListener('click', (e) => {
  const star = new Star(e.clientX, e.clientY, '·');
  constellations.push({ stars: [star], lines: [], age: 0 });
});

resize();
animate();
</script>
</body>
</html>
